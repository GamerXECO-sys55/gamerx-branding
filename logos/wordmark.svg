<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="GamerX OS">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"  stop-color="#00D9FF"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FF2EC4"/>
    </linearGradient>
    <linearGradient id="osTone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6EAF8"/>
      <stop offset="100%" stop-color="#8A93B8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mark: stylized GX in a hex notch -->
  <g transform="translate(20,30)" filter="url(#glow)">
    <!-- hex container -->
    <path d="M70 0 L130 35 L130 105 L70 140 L10 105 L10 35 Z"
          fill="none" stroke="url(#aurora)" stroke-width="4" stroke-linejoin="round"/>
    <!-- G (hooked C) -->
    <path d="M55 45
             A30 30 0 1 0 85 95
             L70 95
             L70 75
             L95 75"
          fill="none" stroke="url(#aurora)" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- X overlapping the G -->
    <line x1="80" y1="55" x2="115" y2="100"
          stroke="#FF2EC4" stroke-width="6" stroke-linecap="round"/>
    <line x1="115" y1="55" x2="80" y2="100"
          stroke="#00D9FF" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Wordmark: GamerX OS -->
  <g font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="800" font-size="92">
    <text x="180" y="120" fill="url(#aurora)" letter-spacing="-2">GamerX</text>
    <text x="510" y="120" fill="url(#osTone)" letter-spacing="-1">OS</text>
  </g>

  <!-- Tagline -->
  <text x="184" y="155"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="18"
        font-weight="500"
        letter-spacing="2"
        fill="#8A93B8">THE&#160;&#160;AGENTIC&#160;&#160;ARCH</text>
</svg>
