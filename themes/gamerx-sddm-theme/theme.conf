[General]
# Background mode: image | video | gif | aurora (animated procedural default)
backgroundMode=aurora

# Path relative to the theme directory, used when backgroundMode != aurora
background=background.png
videoBackground=background.mp4

# Branding
showWordmark=true
greetText=Welcome to GamerX OS

# Behavior
hideUserList=false
hidePasswordCaps=true

# Palette overrides — when empty, theme reads /usr/share/gamerx/palettes/<id>.toml
# pointed to by /etc/gamerx/active-palette (set by gamerx-theme system-wide).
palette=
